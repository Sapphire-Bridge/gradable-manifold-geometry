<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="14" fill="#ffffff" stroke="#e2e6ee"/>
  <text x="30" y="40" font-size="21" font-weight="700" fill="#14183a">Cross-domain scalar carrier transfer</text>
  <text x="30" y="63" font-size="13" fill="#6b7488">gemma-3-4b-pt, L20 · donor-conditioned patch · cross/in-domain gold_aligned_effect ratio (rho direction) · random ≈ 0</text>

  <!-- edges -->
  <!-- size-speed: solid (transfers) -->
  <line x1="330" y1="150" x2="228" y2="330" stroke="#1f8a54" stroke-width="3"/>
  <!-- size-weight: solid (transfers) -->
  <line x1="430" y1="150" x2="532" y2="330" stroke="#1f8a54" stroke-width="3"/>
  <!-- speed-weight: dashed grey (near none) -->
  <line x1="300" y1="360" x2="460" y2="360" stroke="#9aa3b2" stroke-width="2.5" stroke-dasharray="7 6"/>

  <!-- direction ratio labels on size-speed edge -->
  <circle cx="315" cy="182" r="5" fill="#1f8a54"/>
  <text x="326" y="187" font-size="12.5" fill="#1f2a1f">size→speed 0.96</text>
  <circle cx="243" cy="300" r="5" fill="#c07d12"/>
  <text x="80" y="305" font-size="12.5" fill="#3a2f12">speed→size 0.20</text>

  <!-- size-weight edge -->
  <circle cx="447" cy="182" r="5" fill="#1f8a54"/>
  <text x="458" y="187" font-size="12.5" fill="#1f2a1f">size→weight 0.64</text>
  <circle cx="519" cy="300" r="5" fill="#1f8a54"/>
  <text x="530" y="305" font-size="12.5" fill="#1f2a1f">weight→size 0.85</text>

  <!-- speed-weight edge -->
  <circle cx="330" cy="345" r="4.5" fill="#9aa3b2"/>
  <text x="300" y="337" font-size="12" fill="#6b7488">speed→weight 0.13</text>
  <circle cx="430" cy="345" r="4.5" fill="#9aa3b2"/>
  <text x="392" y="392" font-size="12" fill="#6b7488">weight→speed 0.07</text>

  <!-- nodes -->
  <g>
    <rect x="300" y="104" width="160" height="52" rx="11" fill="#eef3fc" stroke="#3560c4" stroke-width="2"/>
    <text x="380" y="128" font-size="16" font-weight="700" fill="#1c2f66" text-anchor="middle">SIZE</text>
    <text x="380" y="146" font-size="11" fill="#5566a0" text-anchor="middle">in-domain +3.58 · gate 1.00</text>
  </g>
  <g>
    <rect x="118" y="330" width="160" height="52" rx="11" fill="#eef3fc" stroke="#3560c4" stroke-width="2"/>
    <text x="198" y="354" font-size="16" font-weight="700" fill="#1c2f66" text-anchor="middle">SPEED</text>
    <text x="198" y="372" font-size="11" fill="#5566a0" text-anchor="middle">in-domain +1.96 · gate 0.88</text>
  </g>
  <g>
    <rect x="482" y="330" width="160" height="52" rx="11" fill="#eef3fc" stroke="#3560c4" stroke-width="2"/>
    <text x="562" y="354" font-size="16" font-weight="700" fill="#1c2f66" text-anchor="middle">WEIGHT</text>
    <text x="562" y="372" font-size="11" fill="#5566a0" text-anchor="middle">in-domain +1.72 · mid-range</text>
  </g>

  <!-- legend -->
  <g transform="translate(30,420)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#1f8a54" stroke-width="3"/>
    <text x="42" y="12" font-size="12" fill="#333a52">transfers (ratio ≥ 0.6 shares · 0.2–0.6 partial)</text>
    <line x1="330" y1="8" x2="364" y2="8" stroke="#9aa3b2" stroke-width="2.5" stroke-dasharray="7 6"/>
    <text x="372" y="12" font-size="12" fill="#333a52">near random (&lt; 0.2)</text>
  </g>

  <text x="30" y="458" font-size="12.5" font-weight="600" fill="#14183a">Partially shared, asymmetric, size-centered — not a universal scalar manifold.</text>
  <text x="30" y="478" font-size="11" fill="#6b7488">Transfer strongest along interpretable rho / value-vs-standard directions. Provisional: one model, L20, validation split, small n; read ratios not labels.</text>
</svg>
